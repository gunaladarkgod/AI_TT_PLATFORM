server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: platform-v2-server
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:3}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ai_platform_v2?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Auth (legacy-compatible: Hutool JWT + MD5 password + Redis token index)
platform:
  auth:
    jwt-secret: ${JWT_SECRET:xgls!123#hk}
    jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:86400}
    password-salt-suffix: xglszm
    license-required: false
